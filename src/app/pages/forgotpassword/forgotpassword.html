<div class="forgot-wrapper">
	<div class="container min-vh-100 d-flex align-items-center justify-content-center bg-light">
		<div class="col-md-6 col-lg-5">
			<div class="card shadow-sm border-0 rounded-4 animate-slideUp">
				<div class="card-body p-4">
					<div class="text-center mb-3">
						<div class="icon-circle mb-3 animate-bounce">
							<i class="fas fa-unlock-alt fa-2x text-primary"></i>
						</div>
						<h4 class="fw-bold">Forgot Password</h4>
						<p class="text-muted mb-0">Enter your account email and we'll send reset instructions.</p>
					</div>

					<form class="mt-4" action="#" method="post" novalidate>
						<div class="mb-3 position-relative">
							<label for="fp-email" class="form-label">Email address</label>
							<div class="input-group">
								<span class="input-group-text bg-white"><i class="fas fa-envelope text-muted"></i></span>
								<input id="fp-email" name="email" type="email" class="form-control form-control-lg input-field" placeholder="you@example.com" required>
							</div>
							<div class="form-text text-danger small d-none">Please enter a valid email address.</div>
						</div>

						<button type="submit" class="btn btn-primary btn-lg w-100 fw-semibold mb-3">Send Reset Link</button>

						<div class="text-center">
							<a href="/login" class="text-decoration-none">Back to Sign in</a>
						</div>
					</form>
				</div>
			</div>

			<p class="text-center text-muted small mt-3">We will never share your email with anyone.</p>
		</div>
	</div>
</div>

<!-- Inline CSS animations (HTML-only deliverable) -->
<style>
	:root{--primary:#0d6efd}
	.bg-light{background: linear-gradient(180deg,#f8fafc,#f1f5f9)}
	.animate-slideUp{animation: slideUp .5s ease-out both}
	@keyframes slideUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}
	.animate-bounce{animation:bounce 2s infinite}
	@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
	.icon-circle{width:72px;height:72px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;background:rgba(13,110,253,0.08)}
	.input-field:invalid{border-color:#dc3545}
	.input-field:invalid:focus{box-shadow:0 0 0 3px rgba(220,53,69,0.08)}
	/* show inline error when input is invalid and not empty (CSS-only hint); browsers vary */
	.input-field:invalid + .form-text{display:block}
	.form-text{display:none}
	@media (max-width:576px){.col-md-6{padding:0 1rem}} 
</style>
