<!-- Bootstrap CDN Link in head (add to index.html if not present) -->
<!-- <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet"> -->

<div class="login-wrapper">
  <div class="container-fluid min-vh-100 d-flex align-items-center justify-content-center bg-gradient">
    <div class="row w-100 justify-content-center">
      <div class="col-xl-4 col-lg-5 col-md-6 col-sm-8">
        <!-- Login Card with Animation -->
        <div class="card shadow-lg border-0 login-card animate-slideUp">
          <!-- Header Section -->
          <div class="card-header bg-primary text-white text-center py-4 border-0">
            <div class="login-header-icon animate-bounce">
              <i class="fas fa-lock"></i>
            </div>
            <h2 class="mb-1 fw-bold">Employee Login</h2>
            <p class="text-white-50 mb-0">Welcome Back</p>
          </div>

          <!-- Body Section -->
          <div class="card-body p-4">
            <form>
              <!-- Email Input -->
              <div class="mb-3 input-group-animated">
                <label for="email" class="form-label fw-semibold text-dark">Email Address</label>
                <div class="input-wrapper">
                  <span class="input-icon">
                    <i class="fas fa-envelope"></i>
                  </span>
                  <input 
                    type="email" 
                    class="form-control form-control-lg input-field" 
                    id="email" 
                    placeholder="Enter your email" 
                    required>
                  <div class="error-message">Please provide a valid email address</div>
                </div>
              </div>

              <!-- Password Input -->
              <div class="mb-3 input-group-animated">
                <label for="password" class="form-label fw-semibold text-dark">Password</label>
                <div class="input-wrapper">
                  <span class="input-icon">
                    <i class="fas fa-lock"></i>
                  </span>
                  <input 
                    type="password" 
                    class="form-control form-control-lg input-field" 
                    id="password" 
                    placeholder="Enter your password" 
                    required>
                  <div class="error-message">Password is required</div>
                </div>
              </div>

              <!-- Remember Me & Forgot Password -->
              <div class="row mb-3">
                <div class="col-6">
                  <div class="form-check">
                    <input 
                      class="form-check-input" 
                      type="checkbox" 
                      id="rememberMe" 
                      checked>
                    <label class="form-check-label text-muted" for="rememberMe">
                      Remember me
                    </label>
                  </div>
                </div>
                <div class="col-6 text-end">
                  <a href="" (click)="gotoforgotpassword(); $event.preventDefault()" class="text-decoration-none text-primary fw-semibold link-hover">
                    Forgot Password?
                  </a>
                </div>
              </div>

              <!-- Login Button -->
              <button 
                type="submit" 
                class="btn btn-primary btn-lg w-100 fw-semibold mb-3">
                Sign In
              </button>

              <!-- Divider -->
              <div class="divider-text mb-3">
                <span>Or continue with</span>
              </div>

              <!-- Social Login Buttons -->
              <div class="row g-2">
                <div class="col-6">
                  <button type="button" class="btn btn-outline-secondary btn-social w-100">
                    <i class="fab fa-google"></i> Google
                  </button>
                </div>
                <div class="col-6">
                  <button type="button" class="btn btn-outline-secondary btn-social w-100">
                    <i class="fab fa-microsoft"></i> Microsoft
                  </button>
                </div>
              </div>
            </form>
          </div>

          <!-- Footer Section -->
          <div class="card-footer bg-light text-center py-3 border-0">
            <p class="text-muted mb-0">
              Don't have an account? 
              <a href="#" class="text-primary fw-semibold text-decoration-none link-hover">Sign up here</a>
            </p>
          </div>
        </div>

        <!-- Security Info -->
        <div class="security-info animate-fadeIn">
          <p class="text-white text-center text-sm mt-3">
            <i class="fas fa-shield-alt"></i> Your login is secure and encrypted
          </p>
        </div>
      </div>
    </div>
  </div>
</div>
